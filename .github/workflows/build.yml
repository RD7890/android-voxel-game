name: Build MCME

on:
  push:
    branches:
      - "main"
      - "dev"
      - "release/**"
    paths-ignore:
      - '**.md'
  pull_request:
    branches: ["main"]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build_release_apk:
    name: Build Release APK
    runs-on: ubuntu-latest
    steps:
      - name: Cancel previous runs
        uses: styfle/cancel-workflow-action@0.12.1
        with:
          access_token: ${{ github.token }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'adopt'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and CMake
        run: |
          echo "y" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "ndk;25.2.9519653" \
            "cmake;3.22.1" \
            "build-tools;34.0.0" \
            "platforms;android-34"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Restore Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-v3-${{ hashFiles('**/*.gradle*', '**/*.kts') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Generate signing keystore
        run: |
          mkdir -p signing
          keytool -genkey -v \
            -keystore signing/signing-key.jks \
            -alias MCMEKey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=MCME, OU=Game, O=MCMEStudio, L=Unknown, S=Unknown, C=US" \
            -storepass 123456 \
            -keypass 123456

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> local.properties
          echo "ndk.dir=$ANDROID_SDK_ROOT/ndk/25.2.9519653" >> local.properties
          echo "signing.storeFile=signing/signing-key.jks" >> local.properties
          echo "signing.storePassword=123456" >> local.properties
          echo "signing.keyAlias=MCMEKey" >> local.properties
          echo "signing.keyPassword=123456" >> local.properties

      - name: Assemble Release APK
        env:
          SIGNING_STORE_PASSWORD: "123456"
          SIGNING_KEY_PASSWORD: "123456"
        run: gradle :app:assembleRelease --stacktrace

      - name: Get version name
        id: version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "name=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: MCME-release-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.name }}-build.${{ github.run_number }}
          name: "MCME v${{ steps.version.outputs.name }} (Build #${{ github.run_number }})"
          body: |
            ## MCME — Minecraft Mobile Edition
            Automated release build

            - **Branch:** `${{ github.ref_name }}`
            - **Commit:** `${{ github.sha }}`
            - **Build:** #${{ github.run_number }}

            ### Install
            Download the APK below and install on your Android device (Android 7.0+).
            Enable "Install from unknown sources" if needed.
          draft: false
          prerelease: false
          files: |
            app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
